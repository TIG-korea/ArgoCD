apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  namespace: demo
spec:
  replicas:
  selector:
    matchLabels:
      app: demo-container
  template:
    metadata:
      labels:
        app: demo-container

    spec:
      containers:
        - name: demo-container
          image: docker.io/tigo1234/demo
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: demo-config
